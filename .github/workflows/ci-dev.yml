name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
      - feature/**
jobs:
  lint_html:
    name: HTMLHint Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund || npm install --legacy-peer-deps --no-audit --no-fund

      - name: Run HTMLHint
        run: npm run lint:html

  lint_css:
    name: Stylelint Lint
    runs-on: ubuntu-latest
    needs: lint_html
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund || npm install --legacy-peer-deps --no-audit --no-fund

      - name: Run Stylelint
        run: npm run lint:css

  build_and_docker:
    name: Build + Docker Build & Push
    runs-on: ubuntu-latest
    needs: lint_css
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund || npm install --legacy-peer-deps --no-audit --no-fund

      # Parcel build removed in CI to avoid native rust binaries requirement

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
         context: .
         push: true
         tags: ${{ secrets.DOCKERHUB_USERNAME }}/smart-club:latest